<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Регистрация — Prompt Academy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="./styles.css"
    />
  </head>
  <body class="page">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo-row">
          <a href="/" class="logo">
            <div class="logo-mark" aria-hidden="true"></div>
            <span class="logo-text"><span class="logo-name">Prompt</span> <span class="logo-name logo-name--academy">Academy</span></span>
          </a>
        </div>
        <h1 class="auth-title">Создать аккаунт</h1>
        <p class="auth-subtitle">Сохраняйте прогресс и соревнуйтесь в рейтинге.</p>

        <form
          class="auth-form"
          id="register-form"
        >
          <div class="form-field">
            <label
              for="register-name"
              class="form-label"
              >Имя</label
            >
            <input
              id="register-name"
              name="name"
              type="text"
              class="form-input"
              autocomplete="name"
              required
            />
          </div>
          <div class="form-field">
            <label
              for="register-email"
              class="form-label"
              >Email</label
            >
            <input
              id="register-email"
              name="email"
              type="email"
              class="form-input"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-field">
            <label
              for="register-password"
              class="form-label"
              >Пароль</label
            >
            <input
              id="register-password"
              name="password"
              type="password"
              class="form-input"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="form-footer">
            <div class="form-helper">
              Данные сохраняются локально — это прототип без реального backend.
            </div>
            <button
              class="btn btn-primary"
              type="submit"
              id="register-submit"
            >
              Зарегистрироваться
            </button>
          </div>
        </form>

        <div class="form-alt">
          Уже есть аккаунт?
          <a href="/login">Войти</a>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-brand">
          <a href="/" class="logo">
            <div class="logo-mark" aria-hidden="true"></div>
            <span class="logo-text"><span class="logo-name">Prompt</span> <span class="logo-name logo-name--academy">Academy</span></span>
          </a>
          <p class="footer-tagline">Платформа обучения промпт-инжинирингу</p>
        </div>
        <nav class="footer-nav">
          <a href="/courses">Курсы</a>
          <a href="/practice">Практика</a>
          <a href="/library">Библиотека</a>
          <a href="/leaderboard">Рейтинг</a>
        </nav>
        <div class="footer-bottom">
          <span class="footer-copy">© 2026 Prompt Academy</span>
        </div>
      </div>
    </footer>

    <div
      class="toast-container"
      id="toast-container"
    ></div>

    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/auth.js"></script>
  </body>
</html>
