<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <script src="./js/auth-head.js"></script>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Сертификат — Prompt Academy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page">
    <header class="navbar">
      <div class="container navbar-inner">
        <div class="navbar-left">
          <a href="/" class="logo">
            <div class="logo-mark" aria-hidden="true"></div>
            <span class="logo-text"
              ><span class="logo-name">Prompt</span>
              <span class="logo-name logo-name--academy">Academy</span></span
            >
          </a>
        </div>

        <div class="navbar-right" id="navbar-right">
          <div class="navbar-auth-guest">
            <button class="btn btn-ghost" data-action="open-login">Профиль</button>
            <button class="btn btn-primary" data-action="open-login">Войти</button>
          </div>
          <div class="navbar-auth-user"></div>
        </div>
      </div>
    </header>
    <script>
      window.promptNavbarUserHydrate && window.promptNavbarUserHydrate();
    </script>

    <main class="layout-main">
      <section class="container">
        <div class="page-header" style="margin-bottom: 12px">
          <div>
            <h1 class="page-title">Сертификат</h1>
          </div>
          <div class="filters" style="gap: 10px">
            <button type="button" class="btn btn-primary" id="cert-download-pdf" style="display: none">
              Скачать PDF
            </button>
          </div>
        </div>

        <div class="card" style="padding: 12px">
          <iframe
            id="cert-frame"
            title="Сертификат"
            style="width: 100%; height: 760px; border: 1px solid var(--color-border, #e2e8f0); border-radius: 12px; background: #fff"
          ></iframe>
          <p class="muted" id="cert-status" style="margin: 10px 4px 0">Загрузка…</p>
        </div>
      </section>
    </main>

    <div class="toast-container" id="toast-container"></div>
    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/certificate.js"></script>
  </body>
</html>
